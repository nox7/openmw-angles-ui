<app-topbar></app-topbar>
<aside
  [class.open]="SidebarService.IsOpen()"
  [class.opening]="SidebarService.IsOpening()"
  [class.closing]="SidebarService.IsClosing()"
  (animationend)="OnAnimationEnd($event)"
  >
  <app-sidebar></app-sidebar>
</aside>
<div class="primary-content-window">
  <main [class.no-padding]="HasNoPadding()">
    <router-outlet></router-outlet>
  </main>
  <app-footer></app-footer>
</div>
<div 
  id="backdrop"
  [class.active]="SidebarService.IsOpen() || SidebarService.IsOpening() || SidebarService.IsClosing()"
  ></div>
